<!DOCTYPE html><html><head><title>Shark Bot Admin</title><meta name="viewport" content="width=device-width,initial-scale=1"><style>*{box-sizing:border-box;margin:0;padding:0}body{background:#020408;color:#e2eaf4;font-family:Arial,sans-serif;min-height:100vh}#login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}#admin{display:none}.card{background:#080f1a;border:1px solid #112030;border-radius:20px;padding:40px;max-width:400px;width:100%}h1{color:#00e5ff;font-size:28px;margin-bottom:8px}p{color:#4a6070;margin-bottom:28px;font-size:14px}label{display:block;color:#4a6070;font-size:12px;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}input{width:100%;padding:14px;background:#020408;border:1px solid #112030;border-radius:10px;color:#e2eaf4;font-size:16px;margin-bottom:16px}.btn{width:100%;padding:14px;border-radius:10px;border:none;background:#00e5ff;color:#000;font-size:16px;font-weight:bold;cursor:pointer}.err{color:#ff4455;font-size:13px;margin-top:10px;text-align:center;display:none}.topbar{background:#080f1a;border-bottom:1px solid #112030;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}.topbar h2{color:#00e5ff}.badge{background:#00ff88;color:#000;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:bold}.out-btn{background:#112030;color:#4a6070;padding:8px 16px;border-radius:8px;border:none;cursor:pointer}.content{padding:24px;max-width:900px;margin:0 auto}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:28px}.scard{background:#060e18;border:1px solid #112030;border-radius:14px;padding:20px;text-align:center}.snum{font-size:36px;font-weight:bold;color:#00e5ff}.slabel{color:#4a6070;font-size:12px;margin-top:4px;text-transform:uppercase}.sec{font-size:16px;font-weight:bold;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}.sess{background:#060e18;border:1px solid #112030;border-radius:14px;padding:20px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}.dot{width:10px;height:10px;border-radius:50%;background:#00ff88;box-shadow:0 0 8px #00ff88;flex-shrink:0}.dot.off{background:#ff4455;box-shadow:0 0 8px #ff4455}.sinfo{display:flex;align-items:center;gap:14px}.sname{font-weight:bold}.snum2{color:#4a6070;font-size:13px}.smeta{color:#4a6070;font-size:12px}.acts{display:flex;gap:8px}.abtn{padding:6px 14px;font-size:13px;border-radius:8px;border:none;cursor:pointer;font-weight:bold}.red{background:#ff4455;color:#fff}.grey{background:#112030;color:#e2eaf4}.clist{background:#060e18;border:1px solid #112030;border-radius:14px;overflow:hidden}.crow{padding:14px 20px;border-bottom:1px solid #112030;display:flex;justify-content:space-between;font-size:14px}.crow:last-child{border-bottom:none}.cname{font-weight:bold}.cnum{color:#4a6070;font-size:12px}.ctime{color:#4a6070;font-size:12px}.empty{text-align:center;color:#4a6070;padding:40px;font-size:14px}.ref{background:#112030;color:#e2eaf4;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px}</style></head>
<body>
<div id="login"><div class="card"><h1>🦈 Shark Bot</h1><p>Admin Panel — Login to continue</p><label>Username</label><input id="u" placeholder="admin"/><label>Password</label><input id="p" type="password" placeholder="••••••••"/><button class="btn" onclick="login()">Login →</button><div class="err" id="err">❌ Wrong credentials</div></div></div>
<div id="admin"><div class="topbar"><h2>🦈 Admin Panel</h2><div style="display:flex;gap:12px;align-items:center"><span class="badge">● ONLINE</span><button class="out-btn" onclick="logout()">Logout</button></div></div><div class="content"><div class="stats"><div class="scard"><div class="snum" id="ss">0</div><div class="slabel">Sessions</div></div><div class="scard"><div class="snum" id="sc">0</div><div class="slabel">Contacts</div></div><div class="scard"><div class="snum" id="sm">0</div><div class="slabel">Messages</div></div><div class="scard"><div class="snum" id="sv">0</div><div class="slabel">View Once</div></div></div><div class="sec"><span>📱 Active Sessions</span><button class="ref" onclick="load()">↻ Refresh</button></div><div id="sl"><div class="empty">Loading...</div></div><br/><div class="sec"><span>👥 Recent Contacts</span></div><div class="clist" id="cl"><div class="crow"><span style="color:#4a6070">Loading...</span></div></div></div></div>
<script>
const U="henry",P="henrytech2024";
let tok=localStorage.getItem("tok");
function login(){const u=document.getElementById("u").value,p=document.getElementById("p").value;if(u===U&&p===P){tok=btoa(u+":"+p);localStorage.setItem("tok",tok);show()}else{document.getElementById("err").style.display="block"}}
function logout(){localStorage.removeItem("tok");tok=null;document.getElementById("admin").style.display="none";document.getElementById("login").style.display="flex"}
function show(){document.getElementById("login").style.display="none";document.getElementById("admin").style.display="block";load();setInterval(load,15000)}
async function load(){try{const r=await fetch("/admin/stats").then(x=>x.json());document.getElementById("ss").textContent=r.sessions||0;document.getElementById("sc").textContent=r.contacts||0;document.getElementById("sm").textContent=r.messages||0;document.getElementById("sv").textContent=r.viewonce||0;const sl=document.getElementById("sl");const ses=r.session_list||[];sl.innerHTML=ses.length?ses.map(s=>`<div class="sess"><div class="sinfo"><div class="dot ${s.online?"":"off"}"></div><div><div class="sname">${s.name}</div><div class="snum2">+${s.number||"?"}</div><div class="smeta">Messages: ${s.msg_count||0} · Since: ${s.since||"N/A"}</div></div></div><div class="acts"><button class="abtn grey" onclick="view('${s.name}')">View</button><button class="abtn red" onclick="term('${s.name}')">Terminate</button></div></div>`).join(""):'<div class="empty">No sessions. <a href="/pair" style="color:#00e5ff">Link one →</a></div>';const cl=document.getElementById("cl");const cs=r.recent_contacts||[];cl.innerHTML=cs.length?cs.map(c=>`<div class="crow"><div><div class="cname">${c.name}</div><div class="cnum">${c.sender}</div></div><div class="ctime">${c.time}</div></div>`).join(""):'<div class="crow"><span style="color:#4a6070">No contacts yet</span></div>'}catch(e){}}
async function term(n){if(!confirm(`Terminate "${n}"?`))return;await fetch("/admin/terminate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({session:n})});load()}
function view(n){alert("Session: "+n+"\nFull history coming soon!")}
document.addEventListener("keydown",e=>{if(e.key==="Enter")login()});
if(tok)show();
</script></body></html>
